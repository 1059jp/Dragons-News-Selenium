name: Update News Panel

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: checkout@v4 # 修正: actions/checkout@v4

      - name: Set up Python
        uses: setup-python@v5 # 修正: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Libraries
        run: pip install requests beautifulsoup4

      - name: Run
        run: python SHIN_selenium.py

      - name: Update Files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html SHIN_history.txt
          git commit -m "Update news and history with original logic" || true
          git push
