name: Dragons News Auto Panel

on:
  workflow_dispatch:      # 手動実行用ボタン

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 最新版(v4)にしました

      - name: Set up Python
        uses: actions/setup-python@v5 # 最新版(v5)にしました
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run Python Script
        run: python SHIN_yahoo_dragons.py  # 【修正1】ファイル名を新しいものに合わせました
        env:
          TZ: 'Asia/Tokyo'
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }} # 【修正2】宝箱の鍵をPythonに渡す設定を追加

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # ↓ --allow-empty を追加。これで「変更なし」でも強制的に更新が走ります
          git commit --allow-empty -m "System Update: $(date)"
          git push
