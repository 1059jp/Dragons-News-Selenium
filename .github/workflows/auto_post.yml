name: SHIN Selenium Auto
on:
  schedule:
    - cron: '*/30 * * * *' # 30分おき
  workflow_dispatch: # 手動ボタンも出す
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
      - name: Install Libraries
        run: pip install selenium requests beautifulsoup4
      - name: Run
        env:
          X_USER_ID: ${{ secrets.X_USER_ID }}
          X_PASSWORD: ${{ secrets.X_PASSWORD }}
          X_EMAIL: ${{ secrets.X_EMAIL }}
        run: python SHIN_selenium.py
      - name: Update History
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SHIN_history.txt || exit 0
          git commit -m "Update history" || exit 0
          git push
