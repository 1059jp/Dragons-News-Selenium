name: Update News Panel

on:
  schedule:
    # 5分おきに実行
    - cron: '*/5 * * * *'
  workflow_dispatch:

# --- 付け足し：実行環境自体の時刻を日本に合わせる ---
env:
  TZ: 'Asia/Tokyo'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install requests beautifulsoup4

      - name: Run Python Script
        run: python SHIN_selenium.py

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html SHIN_history.txt
          git commit -m "Fix: JST Time and Click-to-Hide UI" || true
          git push
