name: Update News Panel

on:
  schedule:
    # 1時間に1回自動実行
    - cron: '0 * * * *'
  # 手動でも実行できるようにする
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        # AI要約（requests）とスクレイピング（beautifulsoup4）に必要なものをインストール
        run: pip install requests beautifulsoup4

      - name: Run Python Script
        run: python SHIN_selenium.py

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html SHIN_history.txt
          # 変更がある場合のみコミット
          git commit -m "Update panel with AI summaries (130 chars)" || true
          git push
