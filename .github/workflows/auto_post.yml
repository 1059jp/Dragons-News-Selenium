name: Dragons News Auto Panel

on:
  schedule:
    - cron: '*/5 * * * *'  # 5分おきに実行
  workflow_dispatch:      # 手動実行用ボタン

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 最新版(v4)にしました

      - name: Set up Python
        uses: actions/setup-python@v5 # 最新版(v5)にしました
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run Python Script
        run: python SHIN_yahoo_dragons.py  # 【修正1】ファイル名を新しいものに合わせました
        env:
          TZ: 'Asia/Tokyo'
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }} # 【修正2】宝箱の鍵をPythonに渡す設定を追加

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 【修正3】SHIN_stock.json を git add から外しました（ストック廃止のため）
          git add index.html SHIN_history.txt
          git commit -m "Update dragons news" || true
          git push
